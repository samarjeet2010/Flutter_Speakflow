name: untitled_2

description: "Unlock your linguistic potential with an AI Language Partner App that blends conversational AI with gamified learning, making language mastery an engaging and personalized adventure."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  shared_preferences: ^2.0.0
  image_picker: '>=1.1.2'
  intl: 0.20.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/speakflow.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/speakflow.png
  remove_alpha_ios: true
